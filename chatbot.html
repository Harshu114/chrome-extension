<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot</title>
    <link rel="stylesheet" href="chatbot.css">
</head>
<body>
    <div id="chatbot-container" role="dialog" aria-label="AI Chatbot">
        <div id="chat-header">
            <span>AI Chatbot</span>
            <button id="close-chat" aria-label="Close Chatbot">×</button>
        </div>
        <div id="chat-body" role="log" aria-live="polite"></div>
        <div id="chat-input-container">
            <input type="text" id="chat-input" placeholder="Type a message..." aria-label="Chat Input">
            <button id="send-btn" aria-label="Send Message">Send</button>
        </div>
    </div>

    <script src="chatbot.js"></script>
</body>
</html>
